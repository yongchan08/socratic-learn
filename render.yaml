services:
  - type: web
    name: socratic-learn-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn socratic_tutor.web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        sync: false
